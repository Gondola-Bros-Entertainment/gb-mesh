name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.8.4'

      - name: Cache cabal
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            dist-newstyle
          key: ${{ runner.os }}-cabal-${{ hashFiles('gb-mesh.cabal') }}

      - name: Build
        run: cabal build all --ghc-options="-Werror"

      - name: HLint
        uses: haskell-actions/hlint-setup@v2
      - run: hlint src/
